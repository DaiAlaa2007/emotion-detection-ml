<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Emotion Detector</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            padding: 40px;
        }
        textarea {
            width: 100%;
            height: 80px;
            font-size: 16px;
        }
        button {
            margin-top: 10px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
        .result {
            margin-top: 20px;
            font-size: 18px;
        }
        select {
            font-size: 16px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<h2>🧠 Emotion Detection</h2>

<textarea id="textInput" placeholder="اكتب/ي إحساسك هنا..."></textarea>
<br>
<button onclick="analyze()">حلّل</button>
<script>
async function analyze() {
    const text = document.getElementById("textInput").value;

    const response = await fetch("http://127.0.0.1:8001/predict", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ message: text })
    });

    const data = await response.json();
    const resultDiv = document.getElementById("result");

    if (data.status === "unknown") {
        let optionsHTML = "<p>أنا مش متأكدة الإحساس ده تابع لإيه 🤔</p>";
        optionsHTML += "<select id='emotionSelect'>";
        data.options.forEach(opt => {
            optionsHTML += `<option value="${opt}">${opt}</option>`;
        });
        optionsHTML += "</select>";
        optionsHTML += "<p>اختاري الإحساس الصحيح</p>";
        optionsHTML += "<button onclick='sendFeedback()'>إضافة للتدريب</button>";

        resultDiv.innerHTML = optionsHTML;
    } else {
        resultDiv.innerHTML =
            `<p>الإحساس: <b>${data.emotion}</b></p>
             <p>الثقة: ${data.confidence}</p>`;
    }
}

async function sendFeedback() {
    const text = document.getElementById("textInput").value;
    const emotion = document.getElementById("emotionSelect").value;

    await fetch("http://127.0.0.1:8001/feedback", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            text: text,
            emotion: emotion
        })
    });

    document.getElementById("result").innerHTML =
        "✨ تمام! اتخزنت وهتفيد الموديل بعد كده";
}
</script>

<div class="result" id="result"></div>

</body>
</html>
